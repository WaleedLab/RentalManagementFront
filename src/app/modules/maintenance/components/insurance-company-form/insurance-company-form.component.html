<div class="container-fluid insurance-company-form-page">
  <app-page-header
    [title]="(isEdit() ? 'maintenance.insurance.editTitle' : 'maintenance.insurance.createTitle') | translate"
    [subtitle]="'maintenance.insurance.formSubtitle' | translate"
  />

  @if (initializing()) {
    <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
  } @else {
    <form class="card insurance-company-form__card" [formGroup]="form" (ngSubmit)="save()">
      <div class="card-body row g-3">
        <div class="col-md-6">
          <label class="form-label">{{ 'maintenance.insurance.fieldName' | translate }}</label>
          <input class="form-control" formControlName="name" appFieldValueState />
          @if (form.controls.name.touched && form.controls.name.invalid) {
            <div class="text-danger small mt-1">{{ 'maintenance.insurance.invalidName' | translate }}</div>
          }
        </div>

        <div class="col-md-6">
          <label class="form-label">{{ 'maintenance.insurance.fieldPhone' | translate }}</label>
          <input class="form-control" formControlName="phoneNumber" appFieldValueState appMobileNumberInput />
        </div>

        <div class="col-12">
          <label class="form-label">{{ 'maintenance.insurance.fieldAddress' | translate }}</label>
          <textarea class="form-control" rows="3" formControlName="address" appFieldValueState></textarea>
        </div>
      </div>

      <div class="card-footer d-flex flex-wrap gap-2 justify-content-end">
        <a class="btn btn-light" routerLink="/maintenance/insurance-companies">{{ 'Cancel' | translate }}</a>
        <button class="btn btn-primary" type="submit" [disabled]="saving()">
          @if (saving()) {
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          }
          {{ 'Save' | translate }}
        </button>
      </div>
    </form>
  }
</div>
