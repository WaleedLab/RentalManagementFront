<app-finance-list-shell
  [title]="'Journals'"
  [iconSrc]="financeIcons.journals"
  [subtitle]="'Journals list subtitle'"
  [columns]="columns"
  [rows]="rows()"
  [loading]="loading()"
  [error]="loadError()"
  [count]="totalCount()"
  [pageNumber]="pageNumber()"
  [totalPages]="totalPages()"
  [pageSize]="pageSize()"
  [showPageSize]="true"
  [enableSearch]="true"
  [searchValue]="search()"
  [searchPlaceholder]="'Search journals'"
  [enableSorting]="true"
  [enableDateRangeFilter]="true"
  [orderByValue]="orderBy()"
  [orderByDirectionValue]="orderByDirection()"
  [orderByOptions]="orderByOptions()"
  [dateFrom]="dateFrom()"
  [dateTo]="dateTo()"
  (searchChange)="onSearchChange($event)"
  (orderByChange)="onOrderByChange($event)"
  (orderByDirectionChange)="onOrderByDirectionChange($event)"
  (dateRangeChange)="onDateRangeChange($event)"
  (pageChange)="onPageChange($event)"
  (pageSizeChange)="onPageSizeChange($event)"
  [createLink]="'/journals/create'"
  [createLabel]="'Create Journal Entry'"
  [rowActions]="rowActions"
  (rowAction)="onRowAction($event)"
>
  <div finance-extra-filters class="journal-filters-row2">
  <label class="fin-field journal-extra-filter">
    <span>{{ 'Status' | translate }}</span>
    <app-smooth-select
      [ariaLabel]="'Status' | translate"
      [placeholder]="'All statuses' | translate"
      [options]="statusFilterOptions()"
      [value]="statusFilter()"
      (valueChange)="onStatusFilterChange($any($event))"
    />
  </label>

  <label class="fin-field journal-extra-filter">
    <span>{{ 'Journal Type' | translate }}</span>
    <app-smooth-select
      [ariaLabel]="'Journal Type' | translate"
      [placeholder]="'All journal types' | translate"
      [options]="journalTypeFilterOptions()"
      [value]="journalTypeFilter()"
      (valueChange)="onJournalTypeFilterChange($any($event))"
    />
  </label>

  <label class="fin-field journal-extra-filter">
    <span>{{ 'Operation Type' | translate }}</span>
    <app-smooth-select
      [ariaLabel]="'Operation Type' | translate"
      [placeholder]="'All operation types' | translate"
      [options]="operationTypeFilterOptions()"
      [value]="operationTypeFilter()"
      (valueChange)="onOperationTypeFilterChange($any($event))"
    />
  </label>

  <label class="fin-field journal-extra-filter">
    <span>{{ 'Branch' | translate }}</span>
    <app-smooth-select
      [ariaLabel]="'Branch' | translate"
      [placeholder]="'All branches' | translate"
      [options]="branchFilterOptions()"
      [value]="branchFilter()"
      (valueChange)="onBranchFilterChange($any($event))"
    />
  </label>
  </div>
</app-finance-list-shell>
