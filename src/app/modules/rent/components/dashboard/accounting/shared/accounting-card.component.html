<article class="accounting-card" [attr.data-tone]="tone">
  @if (loading) {
    <div class="skeleton skeleton--title"></div>
    <div class="skeleton skeleton--value"></div>
  } @else {
    <p class="accounting-card__label">{{ label | translate }}</p>
    @if (unavailable) {
      <p class="accounting-card__value accounting-card__value--na" [attr.title]="unavailableHint | translate">
        {{ 'Not available' | translate }}
      </p>
    } @else {
      <p class="accounting-card__value">
        @if (format === 'currency') {
          {{ value | currency: 'SAR' : 'symbol-narrow' : '1.0-0' }}
        } @else {
          {{ value | number: '1.0-0' }}
        }
      </p>
    }
  }
</article>
